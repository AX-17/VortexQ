<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terraria 服务器密码重置成功</title>
</head>
<body style="margin: 0; padding: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
        <tr>
            <td style="padding: 20px 0;">
                <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="500" style="margin: 0 auto; max-width: 500px; width: 100%; background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden;">
                    <!-- Header -->
                    <tr>
                        <td style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; text-align: center;">
                            <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="margin: 0 auto;">
                                <tr>
                                    <td style="width: 60px; height: 60px; background: rgba(255,255,255,0.2); border-radius: 50%; text-align: center; vertical-align: middle; font-size: 30px;">
                                        🔄
                                    </td>
                                </tr>
                            </table>
                            <h1 style="margin: 15px 0 0 0; font-size: 24px; font-weight: 600;">密码重置成功</h1>
                            <div style="font-size: 18px; opacity: 0.9; margin-top: 10px;">{{ServerName}}</div>
                        </td>
                    </tr>
                    <!-- Content -->
                    <tr>
                        <td style="padding: 30px;">
                            <p style="margin: 0 0 20px 0; color: #666; font-size: 14px;">您在 {{ServerName}} 服务器上的密码已重置，以下是新的密码信息：</p>
                            <!-- Password List -->
                            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                                {{PasswordList}}
                            </table>
                            <!-- Warning Box -->
                            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background: #fff3cd; border-left: 4px solid #ffc107; border-radius: 8px; margin-top: 20px;">
                                <tr>
                                    <td style="padding: 15px;">
                                        <h3 style="margin: 0 0 10px 0; color: #856404; font-size: 14px;">⚠️ 重要提醒</h3>
                                        <p style="margin: 5px 0; color: #856404; font-size: 13px; line-height: 1.6;">请立即使用新密码登录游戏，并建议尽快修改为您容易记住的密码。</p>
                                    </td>
                                </tr>
                            </table>
                            <!-- Tips -->
                            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background: #f8f9fa; border-left: 4px solid #667eea; border-radius: 8px; margin-top: 20px;">
                                <tr>
                                    <td style="padding: 15px;">
                                        <h3 style="margin: 0 0 10px 0; color: #667eea; font-size: 14px;">💡 温馨提示</h3>
                                        <p style="margin: 5px 0; color: #666; font-size: 13px; line-height: 1.6;">1. 请妥善保管您的新密码，不要泄露给他人</p>
                                        <p style="margin: 5px 0; color: #666; font-size: 13px; line-height: 1.6;">2. 进入游戏后可以使用 /password [当前密码] [新密码] 修改密码</p>
                                        <p style="margin: 5px 0; color: #666; font-size: 13px; line-height: 1.6;">3. 如有问题请联系服务器管理员</p>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    <!-- Footer -->
                    <tr>
                        <td style="text-align: center; padding: 20px; color: #999; font-size: 12px; border-top: 1px solid #eee;">
                            本邮件由 Vortex Bot 自动发送，请勿回复
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
